<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bridgy's Independence Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#eef1ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.wrap{width:100%;max-width:400px;}
.card{background:#fff;border-radius:24px;padding:28px 24px;box-shadow:0 8px 32px rgba(43,64,241,0.1);}
h1{font-size:26px;font-weight:900;color:#0D1B4B;margin-bottom:8px;line-height:1.2;}
h1 span{color:#2B40F1;}
p.sub{font-size:14px;font-weight:600;color:#6b7280;margin-bottom:20px;line-height:1.5;}
img.bridgy{width:140px;display:block;margin:0 auto 16px;}
input[type=text]{width:100%;border:2px solid #c7d2fe;border-radius:12px;padding:14px 16px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:#0D1B4B;outline:none;margin-bottom:16px;display:block;}
input[type=text]:focus{border-color:#2B40F1;}
.btn{display:block;width:100%;background:#2B40F1;color:#fff;border:none;border-radius:12px;padding:16px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;cursor:pointer;text-align:center;margin-bottom:8px;}
.btn-gold{background:#C9A84C;}
.btn-outline{background:#fff;color:#2B40F1;border:2px solid #2B40F1;}
.progress-wrap{background:#eef1ff;border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden;}
.progress-bar{height:100%;background:#2B40F1;border-radius:20px;transition:width 0.3s;}
.q-text{font-size:18px;font-weight:900;color:#0D1B4B;margin-bottom:16px;line-height:1.3;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.opt{background:#2B40F1;color:#fff;border:none;border-radius:14px;padding:16px 10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;text-align:center;line-height:1.4;min-height:72px;display:flex;align-items:center;justify-content:center;}
.opt.sel{background:#C9A84C;color:#0D1B4B;}
.hint{font-size:13px;font-weight:700;color:#6b7280;text-align:center;margin-bottom:14px;min-height:20px;}
.back-btn{background:none;border:none;font-size:15px;font-weight:700;color:#6b7280;cursor:pointer;margin-bottom:16px;padding:0;}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.q-count{font-size:13px;font-weight:700;color:#6b7280;}
.step-list{list-style:none;margin-bottom:16px;}
.step-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #eef1ff;font-size:13px;font-weight:700;color:#0D1B4B;line-height:1.4;align-items:flex-start;}
.step-item:last-child{border-bottom:none;}
.step-num{background:#2B40F1;color:#fff;border-radius:7px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;}
.aff-box{background:#2B40F1;border-radius:16px;padding:18px;margin-bottom:16px;}
.aff-label{font-size:11px;font-weight:800;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.aff-text{font-size:13px;font-weight:700;color:#C9A84C;line-height:1.6;}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.pill{background:#eef1ff;color:#2B40F1;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:800;}
.profile-title{font-size:20px;font-weight:900;color:#2B40F1;margin-bottom:10px;}
.section-label{font-size:11px;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.two-btn{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.spinner{width:40px;height:40px;border:4px solid #c7d2fe;border-top-color:#2B40F1;border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{text-align:center;font-size:17px;font-weight:800;color:#0D1B4B;margin-bottom:6px;}
.loading-sub{text-align:center;font-size:13px;font-weight:600;color:#6b7280;}
.hidden{display:none;}

@media print{
  body{background:#fff;padding:0;}
  .wrap{max-width:100%;}
  .no-print{display:none!important;}
  .print-only{display:block!important;}
}
.print-only{display:none;}
</style>
</head>
<body>
<div class="wrap">

<!-- WELCOME -->
<div id="s-welcome" class="card">
  <img src="bridgy-hero.png" class="bridgy" alt="Bridgy"/>
  <h1>Let's build your<br><span>Independence Roadmap!</span></h1>
  <p class="sub">Hi! I'm Bridgy. Answer 4 quick questions and I'll build a plan just for you.</p>
  <input type="text" id="child-name" placeholder="Type your first name"/>
  <button class="btn" id="btn-go">LET'S GO!</button>
</div>

<!-- QUESTION -->
<div id="s-question" class="card hidden">
  <div class="top-row">
    <button class="back-btn" id="btn-back">← Back</button>
    <span class="q-count" id="q-count">Question 1 of 4</span>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="q-bar" style="width:25%"></div></div>
  <div class="q-text" id="q-text"></div>
  <div class="opts" id="q-opts"></div>
  <div class="hint" id="q-hint">Pick one to continue</div>
  <button class="btn hidden" id="btn-next">NEXT</button>
</div>

<!-- LOADING -->
<div id="s-loading" class="card hidden" style="text-align:center;padding:48px 24px;">
  <img src="bridgy-hero.png" class="bridgy" alt="Bridgy"/>
  <div class="spinner"></div>
  <div class="loading-text" id="l-text">Building your roadmap...</div>
  <div class="loading-sub">This will only take a moment!</div>
</div>

<!-- RESULTS -->
<div id="s-results" class="card hidden">
  <img src="bridgy-hero.png" class="bridgy" alt="Bridgy" style="width:80px;"/>
  <p class="sub" id="r-greeting" style="margin-bottom:16px;"></p>
  <div class="section-label">Your Profile</div>
  <div class="profile-title" id="r-title"></div>
  <div class="pill-row" id="r-pills"></div>
  <div class="section-label">Your Roadmap</div>
  <ul class="step-list" id="r-steps"></ul>
  <div class="aff-box">
    <div class="aff-label">Your Affirmation</div>
    <div class="aff-text" id="r-aff"></div>
  </div>
  <div class="two-btn no-print">
    <button class="btn btn-outline" id="btn-print">🖨️ Print Plan</button>
    <button class="btn" id="btn-restart">Start Over</button>
  </div>
</div>

</div><!-- /wrap -->

<script>
var questions = [
  {
    text: "What's your independence goal?",
    opts: [
      {label:"Get ready\nfor school", val:"school"},
      {label:"Cook a meal\nor snack", val:"cook"},
      {label:"Stay organized\nwith schoolwork", val:"organized"},
      {label:"Speak up\nfor myself", val:"advocate"},
      {label:"Stay focused\nin class", val:"focus"},
      {label:"Learn how to\nstudy for a test", val:"study"}
    ]
  },
  {
    text: "What gets in your way?",
    opts: [
      {label:"I forget steps\nor lose track", val:"forget"},
      {label:"I get distracted\neasily", val:"distracted"},
      {label:"I don't know\nwhere to start", val:"overwhelmed"},
      {label:"I lose track\nof time", val:"time"}
    ]
  },
  {
    text: "How do YOU learn best?",
    opts: [
      {label:"Checklists\nI can check off", val:"checklist"},
      {label:"Pictures\nand visuals", val:"visual"},
      {label:"Short numbered\nsteps", val:"steps"},
      {label:"Timed mini\nchallenges", val:"timed"}
    ]
  },
  {
    text: "What's YOUR superpower?",
    opts: [
      {label:"I never\ngive up", val:"persistent"},
      {label:"I'm\ncreative", val:"creative"},
      {label:"I'm great\nwith people", val:"social"},
      {label:"I love solving\nproblems", val:"solver"}
    ]
  }
];

var roadmaps = {
  focus: {
    title: "The Focused Problem-Solver",
    pills: ["Determined","Creative","Analytical"],
    steps: ["Break tasks into short steps","Use a timer to stay on track","Eliminate distractions before starting","Check your progress halfway through","Ask for help when you need it","Celebrate every win!"]
  },
  organized: {
    title: "The Organization Champion",
    pills: ["Consistent","Detail-Oriented","Prepared"],
    steps: ["Set up your workspace before starting","Use a color-coded planner every day","Pack your bag the night before","Review your to-do list each morning","Take it one task at a time","Celebrate every organized day!"]
  },
  academic: {
    title: "The Academic Achiever",
    pills: ["Driven","Persistent","Curious"],
    steps: ["Break study time into 20-minute blocks","Review notes the same day as class","Quiz yourself before every test","Ask your teacher one question a week","Find a study buddy you trust","Celebrate every improvement!"]
  },
  daily: {
    title: "The Independence Builder",
    pills: ["Resilient","Brave","Capable"],
    steps: ["Pick one new skill to practice this week","Break it into 3 simple steps","Practice at the same time each day","Track your progress with a chart","Ask a trusted adult to cheer you on","Celebrate every small win!"]
  }
};

var affirmations = {
  focus: "You have what it takes to reach your goals. You stay focused, solve problems, and never give up. Keep going!",
  organized: "You are building skills that will last a lifetime. Stay consistent and watch yourself grow stronger every single day!",
  academic: "Learning is your superpower. Every time you study and try, you are becoming the best version of yourself. Keep going!",
  daily: "You are braver than you believe and stronger than you know. Every step forward is proof that you CAN do this!"
};

var childName = '';
var currentQ = 0;
var answers = [];

function show(id) {
  var ids = ['s-welcome','s-question','s-loading','s-results'];
  for (var i = 0; i < ids.length; i++) {
    document.getElementById(ids[i]).style.display = 'none';
  }
  document.getElementById(id).style.display = 'block';
}

function startGame() {
  var n = document.getElementById('child-name').value.trim();
  if (!n) {
    document.getElementById('child-name').style.borderColor = '#e24b4a';
    document.getElementById('child-name').focus();
    return;
  }
  childName = n;
  currentQ = 0;
  answers = [];
  show('s-question');
  renderQ();
}

function renderQ() {
  var q = questions[currentQ];
  document.getElementById('q-count').textContent = 'Question ' + (currentQ + 1) + ' of ' + questions.length;
  document.getElementById('q-bar').style.width = (((currentQ + 1) / questions.length) * 100) + '%';
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-hint').textContent = 'Pick one to continue';
  document.getElementById('btn-next').style.display = 'none';

  var container = document.getElementById('q-opts');
  container.innerHTML = '';

  for (var i = 0; i < q.opts.length; i++) {
    (function(opt) {
      var btn = document.createElement('button');
      btn.className = 'opt';
      btn.innerHTML = opt.label.replace(/\n/g, '<br>');
      btn.addEventListener('click', function() {
        var all = container.querySelectorAll('.opt');
        for (var j = 0; j < all.length; j++) all[j].className = 'opt';
        btn.className = 'opt sel';
        answers[currentQ] = opt.val;
        document.getElementById('q-hint').textContent = '⭐ Great choice! Tap Next to continue.';
        document.getElementById('btn-next').style.display = 'block';
      });
      container.appendChild(btn);
    })(q.opts[i]);
  }
}

function nextQ() {
  if (!answers[currentQ]) return;
  currentQ++;
  if (currentQ < questions.length) {
    renderQ();
  } else {
    buildResult();
  }
}

function goBack() {
  if (currentQ > 0) {
    currentQ--;
    renderQ();
  } else {
    show('s-welcome');
  }
}

function buildResult() {
  show('s-loading');
  var msgs = ['Building your roadmap...', 'Personalizing your plan...', 'Almost there!'];
  var mi = 0;
  var lt = setInterval(function() {
    mi = (mi + 1) % msgs.length;
    document.getElementById('l-text').textContent = msgs[mi];
  }, 1200);

  setTimeout(function() {
    clearInterval(lt);

    var goal = answers[0] || '';
    var rmKey = 'academic';
    if (goal === 'focus' || goal === 'study') rmKey = 'focus';
    else if (goal === 'organized' || goal === 'school') rmKey = 'organized';
    else if (goal === 'cook' || goal === 'advocate') rmKey = 'daily';

    var rm = roadmaps[rmKey];
    var aff = affirmations[rmKey];

    document.getElementById('r-greeting').textContent = 'Here\'s your personalized roadmap, ' + childName + '!';
    document.getElementById('r-title').textContent = rm.title;
    document.getElementById('r-aff').textContent = aff;

    var pillsEl = document.getElementById('r-pills');
    pillsEl.innerHTML = '';
    for (var i = 0; i < rm.pills.length; i++) {
      var span = document.createElement('span');
      span.className = 'pill';
      span.textContent = rm.pills[i];
      pillsEl.appendChild(span);
    }

    var stepsEl = document.getElementById('r-steps');
    stepsEl.innerHTML = '';
    for (var i = 0; i < rm.steps.length; i++) {
      var li = document.createElement('li');
      li.className = 'step-item';
      li.innerHTML = '<span class="step-num">' + (i + 1) + '</span><span>' + rm.steps[i] + '</span>';
      stepsEl.appendChild(li);
    }

    show('s-results');
  }, 3000);
}

function printPlan() {
  window.print();
}

function restart() {
  childName = '';
  currentQ = 0;
  answers = [];
  document.getElementById('child-name').value = '';
  document.getElementById('child-name').style.borderColor = '#c7d2fe';
  show('s-welcome');
}

// Wire up buttons
document.getElementById('btn-go').addEventListener('click', startGame);
document.getElementById('btn-next').addEventListener('click', nextQ);
document.getElementById('btn-back').addEventListener('click', goBack);
document.getElementById('btn-print').addEventListener('click', printPlan);
document.getElementById('btn-restart').addEventListener('click', restart);
document.getElementById('child-name').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') startGame();
});
</script>
</body>
</html>
